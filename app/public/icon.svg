<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#FFD60A"/>

  <!-- Brain icon - simplified, modern design -->
  <g transform="translate(256, 256)">
    <!-- Left hemisphere -->
    <path d="M -80 -100 Q -140 -60 -140 0 Q -140 60 -80 100 Q -60 80 -60 60 L -60 -60 Q -60 -80 -80 -100 Z"
          fill="#7A5E00" opacity="0.9"/>

    <!-- Right hemisphere -->
    <path d="M 80 -100 Q 140 -60 140 0 Q 140 60 80 100 Q 60 80 60 60 L 60 -60 Q 60 -80 80 -100 Z"
          fill="#7A5E00" opacity="0.9"/>

    <!-- Left detail curves -->
    <path d="M -100 -40 Q -120 -30 -120 0" stroke="#FFF3B0" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M -100 40 Q -120 30 -120 0" stroke="#FFF3B0" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Right detail curves -->
    <path d="M 100 -40 Q 120 -30 120 0" stroke="#FFF3B0" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 100 40 Q 120 30 120 0" stroke="#FFF3B0" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Center connection -->
    <ellipse cx="0" cy="0" rx="40" ry="60" fill="#7A5E00" opacity="0.8"/>

    <!-- Highlight curves for depth -->
    <path d="M -60 -70 Q -50 -75 -40 -70" stroke="#FFF3B0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 40 -70 Q 50 -75 60 -70" stroke="#FFF3B0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
